{{define "reset_password.html"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password — HookGuard</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
</head>
<body>
  <main style="max-width:360px;margin:var(--space-9) auto;padding:0 var(--space-5);font-family:var(--font-body)">
    <h1 style="font-family:var(--font-display);font-size:var(--text-xl)">Choose a new password</h1>
    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{.ResetToken}}">
      <input type="hidden" name="uid" value="{{.ResetUID}}">
      <label>New password (12–128 characters)<br><input type="password" name="password" minlength="12" maxlength="128" required autofocus></label><br><br>
      <label>Confirm password<br><input type="password" name="password_confirm" minlength="12" maxlength="128" required></label><br><br>
      <button type="submit">Reset password</button>
    </form>
  </main>
</body>
</html>
{{end}}
